<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base dark gradient -->
    <linearGradient id="bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#020811"/>
      <stop offset="40%" stop-color="#060E1C"/>
      <stop offset="100%" stop-color="#0B1528"/>
    </linearGradient>

    <!-- Teal spotlight — top-left, lights the hero copy area -->
    <radialGradient id="g-teal" cx="35%" cy="28%" r="55%">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.26"/>
      <stop offset="42%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet — bottom-right atmospheric -->
    <radialGradient id="g-violet" cx="86%" cy="74%" r="44%">
      <stop offset="0%"  stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Emerald — lower-left -->
    <radialGradient id="g-emerald" cx="11%" cy="86%" r="36%">
      <stop offset="0%"  stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary teal — top-right corner -->
    <radialGradient id="g-tr" cx="90%" cy="9%" r="26%">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#22d3ee" stroke-width="0.4" stroke-opacity="0.055"/>
    </pattern>

    <!-- Node glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft blur for background network -->
    <filter id="soft"><feGaussianBlur stdDeviation="1.8"/></filter>

    <!-- Bottom fade to page bg -->
    <linearGradient id="fade-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="52%" stop-color="#020811" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020811" stop-opacity="1"/>
    </linearGradient>

    <!-- Left-edge fade so network doesn't clip hard -->
    <linearGradient id="fade-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#020811" stop-opacity="0.5"/>
      <stop offset="8%"  stop-color="#020811" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- === ATMOSPHERIC GLOWS === -->
  <rect width="1920" height="1080" fill="url(#g-teal)"/>
  <rect width="1920" height="1080" fill="url(#g-violet)"/>
  <rect width="1920" height="1080" fill="url(#g-emerald)"/>
  <rect width="1920" height="1080" fill="url(#g-tr)"/>

  <!-- === GRID === -->
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- === MOLECULAR NETWORK — background (soft, low-opacity) === -->
  <g filter="url(#soft)" opacity="0.55">
    <g stroke="#22d3ee" stroke-width="0.9" fill="none" stroke-opacity="0.22">
      <!-- Top band -->
      <line x1="200" y1="200" x2="360" y2="148"/>
      <line x1="360" y1="148" x2="520" y2="240"/>
      <line x1="520" y1="240" x2="680" y2="172"/>
      <line x1="680" y1="172" x2="850" y2="290"/>
      <line x1="850" y1="290" x2="1010" y2="210"/>
      <line x1="1010" y1="210" x2="1180" y2="330"/>
      <line x1="1180" y1="330" x2="1360" y2="250"/>
      <line x1="1360" y1="250" x2="1530" y2="370"/>
      <line x1="1530" y1="370" x2="1720" y2="295"/>
      <!-- Mid band -->
      <line x1="140" y1="480" x2="310" y2="540"/>
      <line x1="310" y1="540" x2="490" y2="456"/>
      <line x1="490" y1="456" x2="660" y2="538"/>
      <line x1="660" y1="538" x2="830" y2="454"/>
      <line x1="830" y1="454" x2="1000" y2="548"/>
      <line x1="1000" y1="548" x2="1170" y2="464"/>
      <line x1="1170" y1="464" x2="1340" y2="556"/>
      <line x1="1340" y1="556" x2="1510" y2="472"/>
      <line x1="1510" y1="472" x2="1700" y2="560"/>
      <!-- Bottom band -->
      <line x1="260" y1="748" x2="430" y2="810"/>
      <line x1="430" y1="810" x2="600" y2="726"/>
      <line x1="600" y1="726" x2="790" y2="816"/>
      <line x1="790" y1="816" x2="970" y2="732"/>
      <line x1="970" y1="732" x2="1150" y2="826"/>
      <line x1="1150" y1="826" x2="1330" y2="742"/>
      <line x1="1330" y1="742" x2="1520" y2="832"/>
      <line x1="1520" y1="832" x2="1700" y2="750"/>
      <!-- Cross-band verticals -->
      <line x1="520" y1="240" x2="490" y2="456"/>
      <line x1="850" y1="290" x2="830" y2="454"/>
      <line x1="1010" y1="210" x2="1000" y2="548"/>
      <line x1="1180" y1="330" x2="1170" y2="464"/>
      <line x1="1360" y1="250" x2="1340" y2="556"/>
      <line x1="490"  y1="456" x2="600"  y2="726"/>
      <line x1="830"  y1="454" x2="790"  y2="816"/>
      <line x1="1000" y1="548" x2="970"  y2="732"/>
      <line x1="1170" y1="464" x2="1150" y2="826"/>
      <line x1="1340" y1="556" x2="1330" y2="742"/>
    </g>
    <!-- Network nodes -->
    <g fill="#22d3ee" fill-opacity="0.45">
      <circle cx="200"  cy="200"  r="2.5"/>
      <circle cx="360"  cy="148"  r="3"/>
      <circle cx="520"  cy="240"  r="4"/>
      <circle cx="680"  cy="172"  r="2.5"/>
      <circle cx="850"  cy="290"  r="4.5"/>
      <circle cx="1010" cy="210"  r="3"/>
      <circle cx="1180" cy="330"  r="3.5"/>
      <circle cx="1360" cy="250"  r="2.5"/>
      <circle cx="1530" cy="370"  r="3"/>
      <circle cx="1720" cy="295"  r="2.5"/>
      <circle cx="140"  cy="480"  r="2.5"/>
      <circle cx="310"  cy="540"  r="3"/>
      <circle cx="490"  cy="456"  r="4"/>
      <circle cx="660"  cy="538"  r="2.5"/>
      <circle cx="830"  cy="454"  r="3.5"/>
      <circle cx="1000" cy="548"  r="4.5"/>
      <circle cx="1170" cy="464"  r="3"/>
      <circle cx="1340" cy="556"  r="3.5"/>
      <circle cx="1510" cy="472"  r="2.5"/>
      <circle cx="1700" cy="560"  r="3"/>
      <circle cx="260"  cy="748"  r="2.5"/>
      <circle cx="430"  cy="810"  r="3"/>
      <circle cx="600"  cy="726"  r="3.5"/>
      <circle cx="790"  cy="816"  r="2.5"/>
      <circle cx="970"  cy="732"  r="4"/>
      <circle cx="1150" cy="826"  r="3"/>
      <circle cx="1330" cy="742"  r="3.5"/>
      <circle cx="1520" cy="832"  r="2.5"/>
      <circle cx="1700" cy="750"  r="3"/>
    </g>
    <!-- Emerald accent nodes at key junctions -->
    <g fill="#34d399" fill-opacity="0.55">
      <circle cx="850"  cy="290"  r="3.5"/>
      <circle cx="1000" cy="548"  r="3.5"/>
      <circle cx="600"  cy="726"  r="2.5"/>
      <circle cx="1330" cy="742"  r="3"/>
    </g>
    <!-- Violet accent nodes -->
    <g fill="#a78bfa" fill-opacity="0.50">
      <circle cx="1530" cy="370"  r="2.5"/>
      <circle cx="1700" cy="560"  r="2.5"/>
      <circle cx="1520" cy="832"  r="2.5"/>
    </g>
  </g>

  <!-- === FOREGROUND — bright key path through the scene === -->
  <g filter="url(#glow)" opacity="0.65">
    <g stroke="#22d3ee" stroke-width="1.1" fill="none" stroke-opacity="0.40">
      <line x1="520"  y1="240"  x2="850"  y2="290"/>
      <line x1="850"  y1="290"  x2="1000" y2="548"/>
      <line x1="1000" cy="548"  x2="1170" y2="464"/>
      <line x1="1010" y1="210"  x2="1180" y2="330"/>
    </g>
    <g fill="#22d3ee">
      <circle cx="850"  cy="290" r="5"   fill-opacity="0.8"/>
      <circle cx="1000" cy="548" r="6"   fill-opacity="0.7"/>
      <circle cx="1180" cy="330" r="4"   fill-opacity="0.75"/>
      <circle cx="520"  cy="240" r="3.5" fill-opacity="0.65"/>
    </g>
    <g fill="#34d399">
      <circle cx="1000" cy="548" r="3"   fill-opacity="0.9"/>
    </g>
  </g>

  <!-- === DECORATIVE RING CLUSTER — right side === -->
  <g transform="translate(1610,418)" opacity="0.18">
    <circle r="195" fill="none" stroke="#22d3ee" stroke-width="0.7"/>
    <circle r="145" fill="none" stroke="#22d3ee" stroke-width="0.5"/>
    <circle r="95"  fill="none" stroke="#34d399" stroke-width="0.8"/>
    <circle r="50"  fill="none" stroke="#22d3ee" stroke-width="1"/>
    <circle r="14"  fill="#22d3ee" fill-opacity="0.35"/>
    <circle r="5"   fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Orbit dots -->
    <circle cx="195"  cy="0"   r="3.5" fill="#22d3ee" fill-opacity="0.55"/>
    <circle cx="-145" cy="0"   r="3"   fill="#34d399" fill-opacity="0.55"/>
    <circle cx="0"    cy="-95" r="3"   fill="#a78bfa" fill-opacity="0.50"/>
    <circle cx="95"   cy="0"   r="2.5" fill="#22d3ee" fill-opacity="0.45"/>
    <circle cx="67.2" cy="67.2" r="2"  fill="#34d399" fill-opacity="0.40"/>
  </g>

  <!-- === SECONDARY RING — partially off left edge === -->
  <g transform="translate(100,590)" opacity="0.13">
    <circle r="230" fill="none" stroke="#a78bfa" stroke-width="0.6"/>
    <circle r="165" fill="none" stroke="#a78bfa" stroke-width="0.4"/>
    <circle r="100" fill="none" stroke="#22d3ee" stroke-width="0.6"/>
    <circle r="10"  fill="#a78bfa" fill-opacity="0.45"/>
    <circle r="4"   fill="#a78bfa" fill-opacity="0.90"/>
  </g>

  <!-- === EDGE FADES === -->
  <rect width="1920" height="1080" fill="url(#fade-bottom)"/>
  <rect width="1920" height="1080" fill="url(#fade-left)"/>
</svg>
