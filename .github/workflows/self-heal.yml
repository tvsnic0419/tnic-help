name: TNiC Self-Healing Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check homepage availability
        run: |
          echo "Checking https://tnic.help"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://tnic.help)
          if [ "$CODE" != "200" ]; then
            echo "FAIL: Homepage returned HTTP $CODE"
            exit 1
          fi
          echo "OK: Homepage returned 200"

      - name: Check key routes return 200
        run: |
          for ROUTE in /dashboard /products /tools /quiz /trust /elite-8 /library /library/compounds/taurine; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://tnic.help${ROUTE}")
            if [ "$CODE" != "200" ]; then
              echo "FAIL: https://tnic.help${ROUTE} returned HTTP $CODE"
              exit 1
            fi
            echo "OK: ${ROUTE} → 200"
          done

      - name: Validate production build identity
        run: |
          CONTENT=$(curl -s --max-time 15 https://tnic.help)
          if [[ "$CONTENT" != *"TNiC"* ]]; then
            echo "FAIL: Production identity string 'TNiC' not found"
            exit 1
          fi
          echo "OK: Production identity confirmed"

      - name: Confirm www redirects to apex
        run: |
          FINAL_URL=$(curl -s -o /dev/null -w "%{url_effective}" -L --max-time 15 https://www.tnic.help)
          if [[ "$FINAL_URL" != *"tnic.help"* ]]; then
            echo "FAIL: www did not redirect to tnic.help (landed at: $FINAL_URL)"
            exit 1
          fi
          echo "OK: www → $FINAL_URL"

      - name: Check sitemap is reachable
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://tnic.help/sitemap.xml)
          if [ "$CODE" != "200" ]; then
            echo "FAIL: sitemap.xml returned HTTP $CODE"
            exit 1
          fi
          echo "OK: sitemap.xml → 200"